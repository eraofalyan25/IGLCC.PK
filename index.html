<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>IGLCC — Iqra Global Language &amp; Career Center</title>
<style>
  :root{
    --navy:#0b2540;
    --navy-2:#123a63;
    --gold:#c9a24b;
    --gold-2:#e8c877;
    --paper:#fbfaf7;
    --ink:#1b2532;
    --line:#e3e0d6;
    --ok:#1f7a4d;
    --bad:#a83232;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--paper); color:var(--ink);}
  h1,h2,h3{font-family:Georgia,'Times New Roman',serif; letter-spacing:.2px;}
  a{color:inherit;}

  header.top{
    background:linear-gradient(120deg,var(--navy) 0%,var(--navy-2) 60%,#0e2f52 100%);
    color:#fff; padding:0 26px;
    position:sticky; top:0; z-index:50; box-shadow:0 4px 18px rgba(0,0,0,.18);
  }
  .header-inner{
    max-width:1240px; margin:0 auto; padding:14px 0;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .logo-mark{
    width:50px;height:50px;border-radius:50%;
    object-fit:contain; background:#fff; border:2px solid rgba(255,255,255,.6); flex-shrink:0;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
  }
  .brand .name{font-size:14.5px; font-weight:700; line-height:1.2;}
  .brand .name small{display:block; font-weight:400; opacity:.8; font-size:11px; letter-spacing:.3px;}
  nav{display:flex; gap:6px; flex-wrap:wrap;}
  nav button{background:transparent;border:1px solid rgba(255,255,255,.18); color:#fff; padding:8px 13px;
    border-radius:999px; cursor:pointer; font-size:12.5px; transition:.2s;}
  nav button:hover{background:rgba(255,255,255,.1);}
  nav button.active{background:var(--gold); color:var(--navy); border-color:var(--gold); font-weight:700;}

  main{max-width:1240px; margin:0 auto; padding:30px 22px 90px;}
  @keyframes pageIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  #app{animation:pageIn .35s ease;}
  @keyframes shimmer{ 0%{background-position:0% 50%;} 100%{background-position:200% 50%;} }
  .hero h1{background-size:200% auto; animation:shimmer 5s linear infinite;}
  @keyframes floatY{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  .lang-card.live{animation:floatY 3.5s ease-in-out infinite;}
  nav button.active{position:relative;}
  nav button.active::after{content:"";position:absolute;left:14px;right:14px;bottom:3px;height:2px;background:var(--gold);border-radius:2px;}
  .hero{
    background:radial-gradient(circle at 15% 20%, rgba(201,162,75,.22), transparent 55%),
               linear-gradient(135deg,var(--navy),var(--navy-2));
    color:#fff; border-radius:18px; padding:46px 38px; margin-bottom:28px; position:relative; overflow:hidden;
    box-shadow:0 16px 40px rgba(11,37,64,.3);
  }
  .hero::after{content:""; position:absolute; right:-60px; top:-60px; width:220px; height:220px; border-radius:50%;
    background:radial-gradient(circle, rgba(232,200,119,.3), transparent 70%);}
  .hero h1{font-size:32px; margin:0 0 10px; max-width:640px; text-shadow:0 3px 14px rgba(0,0,0,.35);}
  .hero p{max-width:580px; opacity:.9; line-height:1.55;}
  .hero .tag{display:inline-block; background:rgba(232,200,119,.18); border:1px solid rgba(232,200,119,.45);
    color:var(--gold-2); padding:5px 14px; border-radius:999px; font-size:12px; letter-spacing:.5px; margin-bottom:16px;}

  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:16px; margin:20px 0;}
  .card{background:#fff; border:1px solid var(--line); border-radius:14px; padding:20px; box-shadow:0 3px 14px rgba(11,37,64,.07); transition:.2s; position:relative; overflow:hidden;}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-2));transform:scaleX(0);transform-origin:left;transition:.25s;}
  .card:hover{transform:translateY(-3px); box-shadow:0 14px 30px rgba(11,37,64,.14);}
  .card:hover::before{transform:scaleX(1);}
  .card h3{margin:0 0 6px; font-size:16.5px; color:var(--navy-2);}
  .card p{font-size:13.5px; color:#555; line-height:1.55; margin:0;}
  .badge{display:inline-block; font-size:11px; font-weight:700; padding:3px 9px; border-radius:6px; background:linear-gradient(120deg,var(--navy),var(--navy-2)); color:var(--gold-2); margin-bottom:8px; box-shadow:0 2px 8px rgba(11,37,64,.25);}

  .panel{background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px; margin-bottom:20px; box-shadow:0 4px 18px rgba(11,37,64,.05);}
  .panel h2{margin-top:0; color:var(--navy); border-bottom:3px solid var(--gold); display:inline-block; padding-bottom:6px;}
  .panel .sub{color:#666; font-size:13.5px; margin-top:-4px;}

  label{display:block; font-size:13px; font-weight:600; margin:12px 0 5px; color:var(--navy-2);}
  input[type=text],input[type=password],input[type=email],input[type=tel],textarea,select{
    width:100%; padding:10px 12px; border:1px solid #cfd6de; border-radius:8px; font-size:14px; font-family:inherit;}
  textarea{resize:vertical; min-height:90px;}
  .btn{background:linear-gradient(135deg,var(--navy),var(--navy-2)); color:#fff; border:none; padding:11px 22px;
    border-radius:9px; cursor:pointer; font-size:14px; font-weight:600; margin-top:16px; transition:.2s; box-shadow:0 4px 14px rgba(11,37,64,.25);}
  .btn:hover{opacity:.95; transform:translateY(-2px); box-shadow:0 8px 20px rgba(11,37,64,.35);}
  .btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-2)); color:var(--navy); box-shadow:0 4px 16px rgba(201,162,75,.4);}
  .btn.gold:hover{box-shadow:0 10px 26px rgba(201,162,75,.55);}
  .btn.outline{background:#fff; color:var(--navy-2); border:1.5px solid var(--navy-2); box-shadow:none;}
  .btn.small{padding:6px 14px; font-size:12.5px; margin-top:0;}
  .row{display:flex; gap:14px; flex-wrap:wrap;}
  .row > *{flex:1; min-width:180px;}
  .msg{padding:10px 14px; border-radius:8px; font-size:13.5px; margin-top:14px;}
  .msg.ok{background:#e8f6ee; color:var(--ok); border:1px solid #bfe5cf;}
  .msg.err{background:#fbe9e9; color:var(--bad); border:1px solid #f0c2c2;}

  .tabs{display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap;}
  .tabs button{background:#f1f1ee; border:1px solid var(--line); padding:8px 16px; border-radius:8px 8px 0 0;
    cursor:pointer; font-size:13px; font-weight:600; color:#555;}
  .tabs button.active{background:var(--navy); color:#fff; border-color:var(--navy);}

  .q{border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:14px; background:#fffefb;}
  .q .qtitle{font-weight:600; margin-bottom:8px; color:var(--navy-2);}
  .opts label{display:flex; align-items:center; gap:8px; font-weight:400; margin:6px 0; cursor:pointer;}
  .opts input{width:auto;}
  table{width:100%; border-collapse:collapse; margin-top:10px;}
  th,td{text-align:left; padding:9px 10px; border-bottom:1px solid var(--line); font-size:13.5px;}
  th{color:var(--navy-2); font-size:12px; text-transform:uppercase; letter-spacing:.4px;}
  .idcard{background:linear-gradient(135deg,var(--navy),var(--navy-2)); color:#fff; border-radius:14px; padding:22px;
    display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; gap:14px; flex-wrap:wrap;}
  .idcard .qr{width:64px;height:64px; border-radius:8px;
    background:repeating-linear-gradient(45deg,var(--gold),var(--gold) 4px,var(--navy) 4px,var(--navy) 8px); flex-shrink:0;}
  .pass{color:var(--ok); font-weight:700;}
  .fail{color:var(--bad); font-weight:700;}
  .pending{color:#a67c00; font-weight:700;}
  .note{font-size:12.5px; color:#777; margin-top:6px;}
  .transcript{background:#f6f3ec; border:1px dashed var(--gold); border-radius:10px; padding:14px; font-size:13.5px;
    line-height:1.6; margin:10px 0; display:none; white-space:pre-line;}
  .transcript.shown{display:block;}
  .audiobar{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .speaking{color:var(--navy-2); font-size:12.5px; font-weight:600;}
  footer{text-align:center; padding:30px; color:#888; font-size:12.5px; border-top:1px solid var(--line); margin-top:40px;}

    .uni-hero{
    background:linear-gradient(120deg, #06162a 0%, #0b2540 45%, #123a63 100%);
    border:1px solid rgba(232,200,119,.35);
    display:flex; align-items:center; justify-content:space-between; gap:30px; flex-wrap:wrap;
    box-shadow:0 20px 50px rgba(11,37,64,.35);
    padding:40px;
    min-height:340px;
  }
  .uni-hero .hero-text{flex:1 1 400px; min-width:280px; position:relative; z-index:2;}
  .uni-hero .hero-art{display:none;}
  .uni-hero .hero-photo{
    flex:1 1 380px; min-width:260px; max-width:460px;
    border-radius:14px; overflow:hidden; border:2px solid rgba(232,200,119,.5);
    box-shadow:0 18px 40px rgba(0,0,0,.4);
    background:#eef1f4; line-height:0;
  }
  .uni-hero .hero-photo img{ width:100%; height:auto; display:block; }
  .uni-hero h1{
    font-size:38px; text-shadow:0 4px 20px rgba(0,0,0,.5);
    background:linear-gradient(90deg,#fff, var(--gold-2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .uni-hero .tag{
    background:rgba(232,200,119,.22); border:1px solid var(--gold); color:var(--gold-2);
    box-shadow:0 0 18px rgba(232,200,119,.25);
  }
  .stats-bar{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:0;
    background:linear-gradient(120deg,var(--navy),var(--navy-2)); border-radius:16px; overflow:hidden; margin:0 0 28px;
    box-shadow:0 10px 30px rgba(11,37,64,.25);
  }
  .stat-cell{
    padding:24px 14px; text-align:center; border-right:1px solid rgba(255,255,255,.12);
    transition:.2s;
  }
  .stat-cell:hover{background:rgba(232,200,119,.08);}
  .stat-cell:last-child{border-right:none;}
  .stat-num{font-family:Georgia,serif; font-size:30px; font-weight:800; color:var(--gold-2); text-shadow:0 0 20px rgba(232,200,119,.35);}
  .stat-label{font-size:11.5px; color:rgba(255,255,255,.8); margin-top:4px; letter-spacing:.4px;}
  .quick-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-top:16px;}
  .quick-card{
    background:linear-gradient(145deg,#ffffff,#f7f5ef); border:1px solid var(--line); border-radius:14px; padding:20px 14px; text-align:center;
    cursor:pointer; transition:.2s; position:relative; overflow:hidden;
  }
  .quick-card:hover{border-color:var(--gold); transform:translateY(-4px) scale(1.02); box-shadow:0 14px 28px rgba(11,37,64,.15);}
  .quick-icon{font-size:26px; filter:drop-shadow(0 2px 4px rgba(0,0,0,.15));}
  .quick-title{font-weight:700; color:var(--navy-2); font-size:13.5px; margin-top:6px;}
  .quick-sub{font-size:11px; color:#888; margin-top:2px;}
  .lang-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-top:16px;}
  .lang-card{
    background:linear-gradient(160deg,#ffffff,#f8f6f0); border:1px solid var(--line); border-radius:14px; padding:18px 14px; text-align:center;
    box-shadow:0 3px 12px rgba(11,37,64,.06); position:relative; transition:.2s;
  }
  .lang-card:hover{transform:translateY(-3px); box-shadow:0 12px 26px rgba(11,37,64,.14);}
  .lang-card.live{border:2px solid var(--gold); box-shadow:0 6px 22px rgba(201,162,75,.3);}
  .lang-card.soon{opacity:.72;}
  .lang-flag{width:56px; height:40px; margin:0 auto;}
  .lang-flag svg, .lang-flag img{width:100%; height:100%; display:block; border-radius:6px; box-shadow:0 1px 5px rgba(0,0,0,.28); object-fit:cover;}
  .fi-inline{width:1.5em; height:1.05em; display:inline-block; vertical-align:middle; margin-right:8px;}
  .fi-inline svg, .fi-inline img{width:100%; height:100%; display:block; border-radius:3px; box-shadow:0 1px 3px rgba(0,0,0,.28); object-fit:cover;}
  .lang-name{font-weight:700; color:var(--navy-2); margin-top:8px; font-size:15px;}
  .lang-status{
    display:inline-block; margin-top:6px; font-size:10.5px; font-weight:700; letter-spacing:.4px;
    padding:3px 9px; border-radius:999px; text-transform:uppercase;
  }
  .lang-status.live{background:var(--gold); color:var(--navy); animation:pulseGlow 2.2s ease-in-out infinite;}
  @keyframes pulseGlow{ 0%,100%{box-shadow:0 0 0 0 rgba(201,162,75,.5);} 50%{box-shadow:0 0 0 6px rgba(201,162,75,0);} }
  .lang-status.soon{background:#eee; color:#888;}
  .lang-desc{font-size:11.5px; color:#777; margin-top:6px; line-height:1.4;}
  .splash-overlay{
    position:fixed; inset:0; z-index:999;
    background:linear-gradient(120deg, var(--navy), var(--navy-2), #0e2f52, var(--navy));
    background-size:300% 300%;
    animation:splashBgShift 8s ease infinite;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:opacity .6s ease, visibility .6s ease;
    overflow:hidden;
  }
  @keyframes splashBgShift{ 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }
  .splash-overlay::before, .splash-overlay::after{
    content:""; position:absolute; border-radius:50%; filter:blur(2px);
    background:radial-gradient(circle, rgba(232,200,119,.22), transparent 70%);
  }
  .splash-overlay::before{ width:420px; height:420px; top:-120px; left:-100px; animation:floatBlob 9s ease-in-out infinite; }
  .splash-overlay::after{ width:340px; height:340px; bottom:-100px; right:-80px; animation:floatBlob 11s ease-in-out infinite reverse; }
  @keyframes floatBlob{ 0%,100%{transform:translate(0,0);} 50%{transform:translate(30px,20px);} }
  .splash-card{
    position:relative; z-index:2; text-align:center; padding:38px 46px;
    width:min(880px, 92vw);
    background:rgba(255,255,255,.06); border:1px solid rgba(232,200,119,.3); border-radius:22px;
    backdrop-filter:blur(6px); box-shadow:0 20px 60px rgba(0,0,0,.4);
    box-sizing:border-box;
  }
  .splash-flag{width:100%; max-width:720px; height:min(52vh, 440px); margin:0 auto 20px; opacity:0; transform:scale(.97); transition:opacity .45s ease, transform .45s ease; overflow:hidden; border-radius:16px;}
  .splash-flag.show{opacity:1; transform:scale(1);}
  .splash-flag svg{width:100%; height:100%; display:block;}
  .splash-flag img{width:100%; height:100%; object-fit:cover; display:block; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,.45); animation:splashZoom 3.6s ease-out forwards;}
  @keyframes splashZoom{ from{transform:scale(1.12);} to{transform:scale(1);} }
  .splash-logo{width:min(150px, 30vw); height:min(150px, 30vw); margin:0 auto 22px; border-radius:50%; background:#fff; padding:14px; box-sizing:border-box;
    box-shadow:0 10px 34px rgba(0,0,0,.4); opacity:0; transform:scale(.9); transition:opacity .5s ease, transform .5s ease;}
  .splash-logo.show{opacity:1; transform:scale(1);}
  .splash-logo img{width:100%; height:100%; object-fit:contain; display:block;}
  .splash-greeting{
    font-family:Georgia,serif; font-size:clamp(26px, 5vw, 46px); color:#fff; font-weight:700;
    background:linear-gradient(90deg,#fff,var(--gold-2),#fff); background-size:200% auto;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    opacity:0; transform:translateY(10px); transition:opacity .45s ease, transform .45s ease;
  }
  .splash-greeting.show{opacity:1; transform:translateY(0); animation:splashTextShimmer 2.2s linear infinite;}
  @keyframes splashTextShimmer{ from{background-position:0% 50%;} to{background-position:200% 50%;} }
  .splash-sub{font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--gold-2); margin-top:10px; opacity:0; transition:opacity .45s ease;}
  .splash-sub.show{opacity:.9;}
  .splash-dots{display:flex; gap:7px; justify-content:center; margin-top:24px;}
  .splash-dot{width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.28); transition:.3s;}
  .splash-dot.active{background:var(--gold-2); transform:scale(1.5); box-shadow:0 0 8px rgba(232,200,119,.7);}
  .splash-skip{
    position:absolute; bottom:34px; z-index:3; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.35); color:#fff;
    padding:8px 18px; border-radius:999px; cursor:pointer; font-size:12px; opacity:.75; backdrop-filter:blur(4px);
  }
  .splash-skip:hover{opacity:1; background:rgba(255,255,255,.15);}
  .splash-overlay.splash-hide{opacity:0; visibility:hidden; pointer-events:none;}
  @media (max-width:600px){
    .splash-card{padding:26px 18px;}
    .splash-flag{height:38vh;}
  }

  /* ---------------- MOBILE NAV (hamburger) ---------------- */
  .nav-toggle{
    display:none; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.35); color:#fff;
    width:42px; height:42px; border-radius:10px; cursor:pointer; font-size:20px; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .nav-close{display:none;}
  .nav-backdrop{display:none; position:fixed; inset:0; background:rgba(6,15,28,.55); z-index:59; backdrop-filter:blur(2px);}
  .nav-backdrop.show{display:block;}

  @media (max-width:880px){
    header.top{padding:0 16px;}
    .header-inner{padding:12px 0; justify-content:space-between;}
    .brand{gap:9px;}
    .logo-mark{width:40px; height:40px;}
    .brand .name{font-size:12.5px;}
    .brand .name small{font-size:9.5px;}
    .nav-toggle{display:flex;}
    nav#nav{
      display:none; position:fixed; top:0; right:0; bottom:0; width:80%; max-width:300px;
      background:linear-gradient(160deg,var(--navy) 0%, var(--navy-2) 100%);
      flex-direction:column; align-items:stretch; gap:6px; margin:0;
      padding:70px 16px 24px; box-shadow:-14px 0 40px rgba(0,0,0,.4); z-index:60;
      overflow-y:auto;
    }
    nav#nav.nav-open{display:flex;}
    nav#nav button{width:100%; text-align:left; border-radius:10px; padding:12px 14px; font-size:14.5px;}
    nav#nav button.active::after{display:none;}
    .nav-close{
      display:block; position:absolute; top:16px; right:16px; background:transparent; border:none; color:#fff;
      font-size:22px; cursor:pointer; width:36px; height:36px; line-height:1;
    }
    main{padding:20px 14px 70px;}
    .hero{padding:26px 20px; border-radius:14px;}
    .hero h1{font-size:22px;}
    .hero p{font-size:13.5px;}
    .uni-hero{min-height:auto; padding:26px 20px; background-position:center;}
    .uni-hero h1{font-size:24px;}
    .stats-bar{grid-template-columns:repeat(2,1fr);}
    .stat-cell{padding:16px 10px;}
    .stat-num{font-size:22px;}
    .idcard{flex-direction:column; text-align:center;}
    .row{gap:10px;}
    .row > *{min-width:100%;}
    .panel{padding:20px 16px;}
    table{display:block; width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch;}
    th,td{white-space:nowrap;}
  }
  @media (max-width:480px){
    .grid, .lang-grid, .quick-grid{grid-template-columns:repeat(2,1fr);}
    .hero h1{font-size:19px;}
    .uni-hero h1{font-size:20px;}
    .stats-bar{grid-template-columns:repeat(2,1fr);}
  }
</style>
<!-- Firebase (real backend). Fill in FIREBASE_CONFIG below with your own project's config to activate. -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="splash" class="splash-overlay">
  <div class="splash-card">
    <div class="splash-logo" id="splashLogo"></div>
    <div class="splash-flag" id="splashFlag"></div>
    <div class="splash-greeting" id="splashGreeting">Hallo</div>
    <div class="splash-sub" id="splashSub">German</div>
    <div class="splash-dots" id="splashDots"></div>
  </div>
  <button id="skipSplash" class="splash-skip">Skip ✕</button>
</div>


<header class="top">

/* =================================================================================
   FIREBASE SETUP — this is the "real backend" a university can actually run on.
   To activate it:
   1. Go to https://console.firebase.google.com → Add project (free).
   2. Build > Authentication > Get Started > enable "Email/Password".
   3. Build > Firestore Database > Create database > start in PRODUCTION mode.
   4. In Firestore > Rules, paste (then Publish):
        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {
            match /kv_store/{docId} {
              allow read: if true;
              allow write: if request.auth != null;
            }
          }
        }
      (This is a reasonable starting point for a pilot: anyone can read, only signed-in
      users can write. Before a full public launch, tighten this further — e.g. restrict
      "cert:" and "batches" writes to admin accounts only via a custom claim or a
      Cloud Function — but this already removes plaintext passwords and gives you a
      real, shared, persistent database instead of per-browser storage.)
   5. Project settings (gear icon) > General > "Your apps" > Add app > Web app.
      Copy the firebaseConfig object it gives you and paste it below, replacing the
      placeholder. That's it — once filled in, the whole site automatically switches
      from local-only storage to this real database, and Login/Register uses real
      Firebase Authentication (no more plaintext passwords in the database).
   ================================================================================= */
const FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
const FIREBASE_READY = FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";
let fbAuth = null, fbDb = null;
if(FIREBASE_READY && typeof firebase !== 'undefined'){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    fbAuth = firebase.auth();
    fbDb = firebase.firestore();
  }catch(e){ console.error('Firebase init failed', e); }
}

/* ---------------- STORAGE HELPERS ----------------
   Three tiers, tried in order:
   1. Firebase Firestore — the real, shared, persistent database. Active once FIREBASE_CONFIG above is filled in.
   2. Claude's window.storage — a shared demo database, only available while previewing inside Claude.
   3. This browser's localStorage — last-resort fallback so the site still works with zero setup,
      but data then stays on that one device only. */
const HAS_CLOUD_STORAGE = (typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function');
async function dbGet(key, fallback){
  if(fbDb){
    try{
      const doc = await fbDb.collection('kv_store').doc(key).get();
      return doc.exists ? JSON.parse(doc.data().value) : fallback;
    }catch(e){ console.error('Firestore read failed', e); return fallback; }
  }
  if(HAS_CLOUD_STORAGE){
    try{ const r = await window.storage.get(key, true); return r ? JSON.parse(r.value) : fallback; }
    catch(e){ return fallback; }
  }
  try{ const raw = localStorage.getItem('iglcc:'+key); return raw!==null ? JSON.parse(raw) : fallback; }
  catch(e){ return fallback; }
}
async function dbSet(key, value){
  if(fbDb){
    try{ await fbDb.collection('kv_store').doc(key).set({ value: JSON.stringify(value) }); return true; }
    catch(e){ console.error('Firestore write failed', e); return false; }
  }
  if(HAS_CLOUD_STORAGE){
    try{ await window.storage.set(key, JSON.stringify(value), true); return true; }
    catch(e){ console.error(e); return false; }
  }
  try{ localStorage.setItem('iglcc:'+key, JSON.stringify(value)); return true; }
  catch(e){ console.error(e); return false; }
}
function slug(s){ return s.trim().toLowerCase().replace(/[^a-z0-9_.-]/g,''); }

const IGLCC_EMAIL = 'alyan.70086@iqra.edu.pk';
// The form below submits directly — it never opens the visitor's email app.
// The submitted data is always saved straight into the site's database (see dbSet calls
// around each sendToInbox call), so nothing is lost even without Formspree configured.
// To ALSO get an automatic email notification when someone submits a form:
// 1. Go to formspree.io and create a free account.
// 2. Create a new form, set its notification address to alyan.70086@iqra.edu.pk, and copy its endpoint URL
//    (looks like https://formspree.io/f/xxxxxxxx).
// 3. Paste that URL below, between the quotes. Leave it blank to just rely on the in-app database (no email sent).
const FORMSPREE_ENDPOINT = 'https://formspree.io/f/mwvdglnd';
async function sendToInbox(subject, fields){
  const body = Object.entries(fields).map(([k,v])=>`${k}: ${v}`).join('\n');
  if(FORMSPREE_ENDPOINT){
    try{
      const res = await fetch(FORMSPREE_ENDPOINT, {
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body: JSON.stringify({ subject, message: body, ...fields })
      });
      if(res.ok) return {sent:true};
    }catch(e){ console.error('Email delivery failed; the submission is still saved in the database', e); }
  }
  // Fallback: no Formspree endpoint configured, so open a pre-filled email
  // straight to IGLCC_EMAIL. The record is already safely stored via dbSet
  // in the caller either way, but this makes sure the request also actually
  // reaches the inbox instead of only sitting in local storage.
  try{
    const mailto = `mailto:${IGLCC_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.open(mailto, '_blank');
    return {sent:true};
  }catch(e){ console.error('Could not open mail client', e); }
  return {sent:false};
}

function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function shuffleMC(items){
  return shuffleArray(items).map(it=>{
    if(!it.opts) return it;
    const order = shuffleArray(it.opts.map((o,i)=>i));
    const opts = order.map(i=>it.opts[i]);
    const correct = order.indexOf(it.correct);
    return {...it, opts, correct};
  });
}
function shuffleAB(items){
  return shuffleArray(items).map(it=>{
    if(Math.random()<0.5) return it;
    return {...it, a:it.b, b:it.a, correct: it.correct==='a'?'b':'a'};
  });
}
function buildActiveExam(level){

            teil2:shuffleAB(src.lesen.teil2), teil3:shuffleArray(src.lesen.teil3) },
    schreiben: src.schreiben,
    sprechen: src.sprechen
  };
}

/* ---------------- AUDIO ENGINE — distinct voice per character + procedural ambient scene sound ---------------- */
let __ac = null;
function ensureAudioCtx(){ if(!__ac){ try{ __ac = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ __ac=null; } } return __ac; }

function playSceneCue(scene){
  const ac = ensureAudioCtx(); if(!ac) return;
  const now = ac.currentTime;
  function tone(freq, start, dur, type, gainVal){
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, now+start);
    g.gain.linearRampToValueAtTime(gainVal, now+start+0.05);
    g.gain.linearRampToValueAtTime(0.0001, now+start+dur);
    o.connect(g); g.connect(ac.destination);
    o.start(now+start); o.stop(now+start+dur+0.05);
  }
  const cues = {
    bahnhof:[[880,0,.25,'sine',.06],[660,.3,.3,'sine',.06]],
    flughafen:[[988,0,.2,'sine',.05],[784,.25,.25,'sine',.05],[659,.5,.3,'sine',.05]],
    restaurant:[[523,0,.1,'sine',.03]],
    geschaeft:[[1200,0,.08,'square',.03]],
    kino:[[300,0,.15,'sine',.03]],
    telefon:[[440,0,.15,'sine',.04],[480,.2,.15,'sine',.04]],
    party:[[523,0,.4,'triangle',.04],[659,.15,.4,'triangle',.04],[784,.3,.4,'triangle',.04]],
    arzt:[[1000,0,.1,'sine',.02]],
    schule:[[700,0,.12,'sine',.02]],
    buero:[[600,0,.1,'sine',.02]],
    strasse:[[250,0,.2,'sawtooth',.02]]
  };
  (cues[scene]||[]).forEach(c=>tone(c[0],c[1],c[2],c[3],c[4]));
}

function startAmbient(scene){
  const ac = ensureAudioCtx();
  if(!ac) return {stop(){}};
  const bufferSize = 2*ac.sampleRate;
  const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
  const data = buffer.getChannelData(0);
  let lastOut = 0;
  for(let i=0;i<bufferSize;i++){
    const white = Math.random()*2-1;
    lastOut = (lastOut + 0.02*white) / 1.02;
    data[i] = lastOut * 3.2;
  }
  const noise = ac.createBufferSource();
  noise.buffer = buffer; noise.loop = true;
  const filter = ac.createBiquadFilter();
  const gain = ac.createGain();
  let gVal = 0.02;
  const cfg = {
    bahnhof:['lowpass',400,.05], flughafen:['lowpass',500,.045], restaurant:['bandpass',1200,.03],
    party:['bandpass',1500,.04], strasse:['highpass',300,.035], buero:['lowpass',250,.014],
    geschaeft:['lowpass',600,.018], telefon:['bandpass',800,.012], kino:['lowpass',200,.015],
    schule:['lowpass',300,.014], arzt:['lowpass',280,.012]
  }[scene] || ['lowpass',400,.02];
  filter.type = cfg[0]; filter.frequency.value = cfg[1]; gVal = cfg[2];
  gain.gain.value = gVal;
  noise.connect(filter); filter.connect(gain); gain.connect(ac.destination);
  try{ noise.start(); }catch(e){}
  playSceneCue(scene);
  return { stop(){ try{ gain.gain.linearRampToValueAtTime(0.0001, ac.currentTime+0.3); noise.stop(ac.currentTime+0.35); }catch(e){} } };
}

let __voiceCache = null;
function getGermanVoices(){
  const all = (window.speechSynthesis && window.speechSynthesis.getVoices()) || [];
  let de = all.filter(v=>v.lang && v.lang.toLowerCase().startsWith('de'));
  if(de.length===0) de = all;
  __voiceCache = de;
  return de;
}
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h<<5)-h+s.charCodeAt(i); h|=0; } return Math.abs(h); }
const __speakerVoice = {};
function pickVoiceFor(spk, gender){
  if(__speakerVoice[spk]) return __speakerVoice[spk];
  const voices = getGermanVoices();
  const femaleHints=['female','frau','anna','hedda','petra','marlene','katja','vicki','helena','martina'];
  const maleHints=['male','herr','yannick','stefan','markus','conrad','klaus','daniel'];
  let pool = voices;
  if(voices.length>1){
    const guess = voices.filter(v=>{
      const n=(v.name||'').toLowerCase();
      return gender==='f' ? femaleHints.some(h=>n.includes(h)) : maleHints.some(h=>n.includes(h));
    });
    if(guess.length) pool = guess;
  }
  const idx = pool.length ? hashStr(spk) % pool.length : 0;
  const info = { voice: pool[idx] || null, pitch: gender==='f' ? 1.15 : 0.85 };
  __speakerVoice[spk] = info;
  return info;
}

function speakItem(item, times, onDoneMsgEl){
  if(!('speechSynthesis' in window)){
    if(onDoneMsgEl) onDoneMsgEl.textContent = 'Audio wird von diesem Browser nicht unterstützt.';
    return;
  }
  window.speechSynthesis.cancel();
  let round = 0;
  function playRound(){
    const ambient = startAmbient(item.scene || 'buero');
    let i = 0;
    if(onDoneMsgEl) onDoneMsgEl.textContent = `🔊 Wird abgespielt… (${round+1}/${times})`;
    function next(){
      if(i >= item.turns.length){
        ambient.stop();
        round++;
        if(round < times) setTimeout(playRound, 700);
        else if(onDoneMsgEl) onDoneMsgEl.textContent = '✔ Audio beendet. Sie können jetzt antworten.';
        return;
      }
      const t = item.turns[i];
      const u = new SpeechSynthesisUtterance(t.text);
      u.lang = 'de-DE';
      u.rate = 0.95;
      const vinfo = pickVoiceFor(t.spk, t.g || 'f');
      if(vinfo.voice) u.voice = vinfo.voice;
      u.pitch = vinfo.pitch;
      u.onend = ()=>{ i++; setTimeout(next, 300); };
      window.speechSynthesis.speak(u);
    }
    next();
  }
  playRound();
}
if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{ __voiceCache=null; }; }

async function doRegister(){
  const name = document.getElementById('rName').value.trim();
  const email = document.getElementById('rEmail').value.trim();
  const phone = document.getElementById('rPhone').value.trim();
  const pass = document.getElementById('rPass').value;
  const level = document.getElementById('rLevel').value;
  const msg = document.getElementById('authMsg');
  if(!name||!email||!phone||!pass){ msg.innerHTML=`<div class="msg err">Please fill in every field.</div>`; return; }
  const studentId = 'IGLCC-'+level+'-'+Math.floor(100000+Math.random()*899999);

  if(FIREBASE_READY){
    try{
      const cred = await fbAuth.createUserWithEmailAndPassword(email, pass);
      const uid = cred.user.uid;
      const user = {username:uid, fullName:name, email, phone, level, studentId, createdAt:new Date().toISOString()};
      await dbSet('user:'+uid, user);
      await dbSet('attempts:'+uid, []);
      await dbSet('enrollments:'+uid, []);
      const allUsers = await dbGet('all-users', []);
      allUsers.push({uid, fullName:name, email, phone, level, studentId, createdAt:user.createdAt});
      await dbSet('all-users', allUsers);
      msg.innerHTML = `<div class="msg ok">Profile created! Your Student ID is <b>${studentId}</b>. You can log in now.</div>`;
      authTab='login'; renderAuth();
    }catch(e){
      msg.innerHTML = `<div class="msg err">${e.message || 'Registration failed.'}</div>`;
    }
    return;
  }

  const uname = slug(email);
  const existing = await dbGet('user:'+uname, null);
  if(existing){ msg.innerHTML=`<div class="msg err">An account with that email already exists.</div>`; return; }
  const user = {username:uname, fullName:name, email, phone, password:pass, level, studentId, createdAt:new Date().toISOString()};
  await dbSet('user:'+uname, user);
  await dbSet('attempts:'+uname, []);
  await dbSet('enrollments:'+uname, []);
  const allUsers = await dbGet('all-users', []);
  allUsers.push({uid:uname, fullName:name, email, phone, level, studentId, createdAt:user.createdAt});
  await dbSet('all-users', allUsers);
  msg.innerHTML = `<div class="msg ok">Profile created! Your Student ID is <b>${studentId}</b>. You can log in now.</div>`;
  authTab='login'; renderAuth();
}

async function doLogin(){
  const email = document.getElementById('lEmail').value.trim();
  const pass = document.getElementById('lPass').value;
  const msg = document.getElementById('authMsg');

  if(FIREBASE_READY){
    try{
      const cred = await fbAuth.signInWithEmailAndPassword(email, pass);
      const uid = cred.user.uid;
      const profile = await dbGet('user:'+uid, null);
      currentUser = profile ? {...profile, username:uid} : {username:uid, email, fullName:email, studentId:'—', level:'—'};
      setView('dashboard');
    }catch(e){
      msg.innerHTML = `<div class="msg err">${e.message || 'Incorrect email or password.'}</div>`;
    }
    return;
  }

  const uname = slug(email);
  const user = await dbGet('user:'+uname, null);
  if(!user || user.password!==pass){ msg.innerHTML=`<div class="msg err">Incorrect email or password.</div>`; return; }
  currentUser = user;
  setView('dashboard');
}

async function doLogout(){
  if(FIREBASE_READY){ try{ await fbAuth.signOut(); }catch(e){} }
  currentUser = null;
  setView('home');
}

function paintSection(){
  const ex = activeExam;
  const body = document.getElementById('examBody');
  if(examSection==='horen') body.innerHTML = renderHoren(ex.horen);
  if(examSection==='lesen') body.innerHTML = renderLesen(ex.lesen);

  attachExamHandlers();
}

  H.teil1.forEach((item,idx)=>{
    html += `<div class="q">
      <div class="qtitle">${item.q}</div>
      <div class="audiobar">
        <button class="btn small outline" onclick="playHoren('${item.id}',2,this)">🔊 Audio abspielen (2×)</button>

    </div>`;
  });
  html += `<h3>Teil 2 — Richtig oder Falsch? — Sie hören jeden Text einmal.</h3>`;
  H.teil2.forEach(item=>{

      <div class="audiobar">

  });
  html += `<h3>Teil 3 — Was ist richtig? (a, b oder c) — Sie hören jeden Text zweimal.</h3>`;
  H.teil3.forEach(item=>{
    html += `<div class="q">
      <div class="qtitle">${item.q}</div>
      <div class="audiobar">
        <button class="btn small outline" onclick="playHoren('${item.id}',2,this)">🔊 Audio abspielen (2×)</button>
        <span class="speaking" id="sp_${item.id}"></span>
      </div>
      <div class="opts">
        ${item.opts.map((o,i)=>`<label><input type="radio" name="${item.id}" value="${i}"> ${String.fromCharCode(97+i)}) ${o}</label>`).join('')}
      </div>
    </div>`;
  });
  return html;
}

function playHoren(id, times, btn){
  const ex = activeExam.horen;
  const all = [...ex.teil1, ...ex.teil2, ...ex.teil3];
  const item = all.find(x=>x.id===id);
  if(!item) return;
  const label = document.getElementById('sp_'+id);
  speakItem(item, times, label);
}

function renderLesen(L){
  let html = `<h3>Teil 1 — Richtig oder Falsch?</h3>
    <div class="transcript shown">${L.teil1_text}</div>`;
  L.teil1.forEach(item=>{
    html += `<div class="q"><div class="qtitle">${item.statement}</div>
      <div class="opts"><label><input type="radio" name="${item.id}" value="true"> Richtig</label>
      <label><input type="radio" name="${item.id}" value="false"> Falsch</label></div></div>`;
  });
  html += `<div class="transcript shown" style="margin-top:16px;">${L.teil1b_text}</div>`;
  L.teil1c.forEach(item=>{
    html += `<div class="q"><div class="qtitle">${item.statement}</div>
      <div class="opts"><label><input type="radio" name="${item.id}" value="true"> Richtig</label>
      <label><input type="radio" name="${item.id}" value="false"> Falsch</label></div></div>`;
  });
  html += `<h3>Teil 2 — Wo finden Sie die Information? (a oder b)</h3>`;
  L.teil2.forEach(item=>{
    html += `<div class="q"><div class="qtitle">${item.q}</div>
      <div class="opts">
        <label><input type="radio" name="${item.id}" value="a"> a) ${item.a}</label>
        <label><input type="radio" name="${item.id}" value="b"> b) ${item.b}</label>
      </div></div>`;
  });
  html += `<h3>Teil 3 — Richtig oder Falsch?</h3>`;
  L.teil3.forEach(item=>{
    html += `<div class="q"><div class="transcript shown">${item.sign}</div><div class="qtitle">${item.statement}</div>
      <div class="opts"><label><input type="radio" name="${item.id}" value="true"> Richtig</label>
      <label><input type="radio" name="${item.id}" value="false"> Falsch</label></div></div>`;
  });
  return html;
}

function renderSchreiben(S){
  let html = `<h3>Teil 1 — Formular ausfüllen</h3><p>${S.teil1_intro}</p>`;
  S.teil1_fields.forEach((f,i)=>{ html += `<div class="q"><label>${f}</label><input type="text" id="sw1_${i}"></div>`; });
  html += `<h3>Teil 2 — Text schreiben</h3>
    <p style="white-space:pre-line;">${S.teil2_prompt}</p>
    <textarea id="sw2" rows="6"></textarea>
    <p class="note">Free-text sections are marked "Pending teacher review" — a teacher grades these using the rubric in the admin panel, as in the real exam.</p>`;
  return html;
}

function renderSprechen(P){
  return `
    <div class="q" style="text-align:center; padding:32px 20px;">
      <h3 style="margin-top:0;">Sprechen (Speaking)</h3>
      <p style="font-size:15px;color:#444;max-width:480px;margin:0 auto 16px;">The Sprechen section is assessed live by a teacher and cannot be taken online.
      Please contact the administration and choose a slot for your Sprechen assessment.</p>
      <button class="btn gold" onclick="setView('help')">Contact Administration / Choose a Slot</button>

  `;

function attachExamHandlers(){
  document.querySelectorAll('#examBody input[type=radio]').forEach(r=>{
    r.addEventListener('change', ()=>{ examAnswers[r.name] = r.value; });
  });
}

function gradeSet(items){
  let correct=0;
  items.forEach(it=>{
    const ans = examAnswers[it.id];
    if(ans===undefined) return;
    if('correct' in it && typeof it.correct==='number'){ if(parseInt(ans)===it.correct) correct++; }
    else if('correct' in it && typeof it.correct==='boolean'){ if((ans==='true')===it.correct) correct++; }
    else if('correct' in it && typeof it.correct==='string'){ if(ans===it.correct) correct++; }
  });
  return correct;
}

async function submitExam(){
  document.querySelectorAll('#examBody input[type=radio]:checked').forEach(r=>{ examAnswers[r.name]=r.value; });
  const ex = activeExam;

  const hScore = gradeSet(ex.horen.teil1) + gradeSet(ex.horen.teil2) + gradeSet(ex.horen.teil3);
  const hTotal = ex.horen.teil1.length + ex.horen.teil2.length + ex.horen.teil3.length;
  const lScore = gradeSet(ex.lesen.teil1) + gradeSet(ex.lesen.teil1c) + gradeSet(ex.lesen.teil2) + gradeSet(ex.lesen.teil3);
  const lTotal = ex.lesen.teil1.length + ex.lesen.teil1c.length + ex.lesen.teil2.length + ex.lesen.teil3.length;

  const autoScore = hScore + lScore;
  const autoTotal = hTotal + lTotal;
  const autoPercent = Math.round((autoScore/autoTotal)*100);
  const passed = autoPercent >= 60;
  const testLabel = TEST_TYPES.find(t=>t.v===examTestType).label;

  const attempts = await dbGet('attempts:'+currentUser.username, []);
  const attemptNumber = attempts.length + 1;

  const record = {
    attemptNumber, level:examLevel, testName:testLabel,
    date:new Date().toISOString(),
    horenScore:hScore, horenTotal:hTotal,
    lesenScore:lScore, lesenTotal:lTotal,
    autoScore, autoTotal, autoPercent, passed,
    schreibenTeil1: ex.schreiben.teil1_fields.map((f,i)=>document.getElementById('sw1_'+i)?.value || ''),
    schreibenTeil2: document.getElementById('sw2')?.value || '',
    reviewStatus:'Pending teacher review (Schreiben & Sprechen) — practice test, no certificate issued'
  };
  attempts.push(record);
  await dbSet('attempts:'+currentUser.username, attempts);

  examSubmitted = true;
  document.getElementById('submitExam')?.remove();
  document.getElementById('examResult').innerHTML = `
    <div class="panel" style="margin-top:18px;">
      <h2>Result — ${examLevel} · ${testLabel} · Attempt #${attemptNumber}</h2>
      <table>
        <tr><th>Section</th><th>Score</th></tr>
        <tr><td>Hören</td><td>${hScore} / ${hTotal}</td></tr>
        <tr><td>Lesen</td><td>${lScore} / ${lTotal}</td></tr>
        <tr><td>Schreiben</td><td class="pending">Pending teacher review</td></tr>
        <tr><td>Sprechen</td><td class="pending">Assessed live — contact administration</td></tr>
      </table>
      <p style="margin-top:14px;font-size:16px;">Auto-graded total: <b>${autoScore}/${autoTotal} (${autoPercent}%)</b> —
        <span class="${passed?'pass':'fail'}">${passed?'PASS (practice)':'FAIL (practice)'}</span></p>
      <p class="note">This is a practice/mock result for self-assessment only — no certificate is issued here. Official certification follows successful completion of your enrolled course.</p>
      <button class="btn" onclick="setView('dashboard')">Back to Dashboard</button>
    </div>
  `;
}

const GREETINGS = [
  {welcome:true, text:'Welcome to IGLCC', name:'Iqra Global Language & Career Center', dwell:1500},
  {iso:'de', text:'Hallo!', name:'German'},
  {iso:'sa', text:'مرحباً!', name:'Arabic'},
  {iso:'tr', text:'Merhaba!', name:'Turkish'},
  {iso:'kr', text:'안녕하세요!', name:'Korean'},
  {iso:'fr', text:'Bonjour!', name:'French'},
  {iso:'cn', text:'你好!', name:'Chinese'},
  {iso:'jp', text:'こんにちは!', name:'Japanese'},
  {iso:'es', text:'¡Hola!', name:'Spanish'}
];
function runSplash(){
  const overlay = document.getElementById('splash');
  const logoEl = document.getElementById('splashLogo');
  const flagEl = document.getElementById('splashFlag');
  const greetEl = document.getElementById('splashGreeting');
  const subEl = document.getElementById('splashSub');
  const dotsEl = document.getElementById('splashDots');
  if(!overlay) return;
  if(dotsEl){
    dotsEl.innerHTML = GREETINGS.map((_,idx)=>`<div class="splash-dot" data-d="${idx}"></div>`).join('');
  }
  const headerLogo = document.querySelector('.logo-mark');
  const logoSrc = headerLogo ? headerLogo.src : '';
  let i = 0;
  let stepTimer = null;
  function paintStep(){
    [logoEl, flagEl, greetEl, subEl].forEach(el=>el.classList.remove('show'));
    setTimeout(()=>{
      const g = GREETINGS[i];
      if(g.welcome){
        logoEl.innerHTML = '';
        flagEl.innerHTML = `<img src="${IU_PHOTO_B64}" alt="Iqra University Building" style="border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,.45);">`;
        flagEl.classList.add('show');
      } else {
        logoEl.innerHTML = '';
        flagEl.innerHTML = LANDMARKS[g.iso] || '';
        flagEl.classList.add('show');
      }
      greetEl.textContent = g.text;
      subEl.textContent = g.name;
      [greetEl, subEl].forEach(el=>el.classList.add('show'));
      if(dotsEl){
        dotsEl.querySelectorAll('.splash-dot').forEach((d,idx)=>d.classList.toggle('active', idx===i));
      }
    }, 120);
  }
  function scheduleNext(){
    const dwell = (GREETINGS[i] && GREETINGS[i].dwell) || 750;
    stepTimer = setTimeout(()=>{
      i++;
      if(i >= GREETINGS.length){
        finishSplash();
        return;
      }
      paintStep();
      scheduleNext();
    }, dwell);
  }
  paintStep();
  scheduleNext();
  function finishSplash(){
    if(stepTimer) clearTimeout(stepTimer);
    overlay.classList.add('splash-hide');
    setTimeout(()=>overlay.remove(), 700);
  }
  document.getElementById('skipSplash').onclick = ()=>{ if(stepTimer) clearTimeout(stepTimer); finishSplash(); };
}
runSplash();

/* ---------- INIT ---------- */
if('speechSynthesis' in window){ window.speechSynthesis.getVoices(); } // warm up voice list
render();
</script>
